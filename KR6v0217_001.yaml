body:
  text: 之一侍者田龍鳳邑正劉胡仁道民田録生王鍾馗道民田倪奴邑正王喜録生劉録生田祖喜道民劉歸宗道民劉道步道民田鳳録生田健一道民劉天平道民劉順道民王歡道民劉安録生劉仵但邑正劉醜奴道民張猥道民常文猥道民王道民田豐洛侍者王道回道民田衆伊中正道民王道養道民常輔相之二道民田市道民王特侍者田奴主道民劉興宗道民常衆保道民田宗道民劉神虎道民田歡洛檀衛主劉漫特邑正劉天威道民張道生道民王天助平望道民田茍仁道民劉黑洛道民田道佛邑正田天與邑老劉漫公道民田洪引道民田神安道民田老德録生劉陽奴録田洪安録生劉仵歡道民劉道虎彈官劉令劍官劉羽歡録生常安洛劉走德録生劉伯虎録生王道夆侍者王祖民王道豫録生薑保興生劉樂祖録生田神覆録生劉道夆之三道民劉成王道民田常雙道民劉始樂道民田道生道安生道民田映俊道民田領族道民田清邑子田阿景道民神慶道民王顯琴道民劉映世道民田大昌道民田神達道民犢道民田景洛道民劉神俱之四道民劉道生道民佛弟子劉文端佛弟子田韶喜道民劉万多佛弟子劉歸喜佛弟子劉衆達道民劉神比丘劉施道民常大聖零妙神化萬方以大道苞浛乾坤造化陰陽故能漸幽暇瑍婚暗朗伊趙體微妙神州丈六金剛能短能萇零朝宗俗望而延天堂於今大魏門師張乾度師道妙率邑子七十人等知求非常皆同生年微福信受法任愛樂瓊文敬崇三寶共興邑儀思建功得成心久著各自竭家珍故匠刊石造刑像一傴上願皇帝陛下牧守令長願保零下為七世父母所生父母常在太上左右大代神龜二年歲次己亥十月丁未朔十四日庚申敬造訖雍州馮翊郡萬年縣西鄉人
